name: CD

on:
  push:
    branches: [ main ]

jobs:
  docker:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Login to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Build and push backend
      uses: docker/build-push-action@v5
      with:
        context: ./G2G.Admin.API
        push: true
        tags: ${{ secrets.DOCKER_USERNAME }}/g2g-admin-backend:latest,${{ secrets.DOCKER_USERNAME }}/g2g-admin-backend:${{ github.sha }}

    - name: Build and push frontend
      uses: docker/build-push-action@v5
      with:
        context: ./frontend
        push: true
        tags: ${{ secrets.DOCKER_USERNAME }}/g2g-admin-frontend:latest,${{ secrets.DOCKER_USERNAME }}/g2g-admin-frontend:${{ github.sha }}
