name: CD

on:
  push:
    branches: [ main ]

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '10.0.x'

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Install frontend dependencies
      run: cd frontend && npm ci

    - name: Build frontend to backend wwwroot
      run: |
        cd frontend
        npm run build
        echo "Frontend built to G2G.Admin.API/wwwroot"
        ls -la ../G2G.Admin.API/wwwroot

    - name: Verify wwwroot
      run: |
        if [ -d "G2G.Admin.API/wwwroot" ]; then
          echo "✅ wwwroot directory exists"
          ls -la G2G.Admin.API/wwwroot
        else
          echo "❌ wwwroot directory not found"
          exit 1
        fi

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Login to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Build and push (backend with frontend)
      uses: docker/build-push-action@v5
      with:
        context: ./G2G.Admin.API
        push: true
        tags: |
          ${{ secrets.DOCKER_USERNAME }}/g2g-admin:latest
          ${{ secrets.DOCKER_USERNAME }}/g2g-admin:${{ github.sha }}
        build-args: |
          BUILD_DATE=${{ github.event.head_commit.timestamp }}
          GIT_SHA=${{ github.sha }}

    - name: Build and push (backup tag)
      if: always()
      uses: docker/build-push-action@v5
      with:
        context: ./G2G.Admin.API
        push: true
        tags: |
          ${{ secrets.DOCKER_USERNAME }}/g2g-admin-admin:latest
        build-args: |
          BUILD_DATE=${{ github.event.head_commit.timestamp }}
