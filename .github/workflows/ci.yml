name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '10.0.x'

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Install frontend dependencies
      run: cd frontend && npm ci

    - name: Build frontend to backend wwwroot
      run: |
        cd frontend
        npm run build
        # 前端自动输出到 ../G2G.Admin.API/wwwroot
        echo "Frontend built to G2G.Admin.API/wwwroot"
        ls -la ../G2G.Admin.API/wwwroot

    - name: Restore backend dependencies
      run: dotnet restore G2G.Admin.API/G2G.Admin.API.csproj

    - name: Build backend (with frontend)
      run: dotnet build G2G.Admin.API/G2G.Admin.API.csproj --no-restore -c Release

    - name: Test backend
      run: dotnet test G2G.Admin.API/G2G.Admin.API.csproj --no-build -c Release

    - name: Publish backend (with frontend)
      run: dotnet publish G2G.Admin.API/G2G.Admin.API.csproj -c Release -o publish --no-build

    - name: Verify wwwroot exists in publish
      run: |
        echo "Checking wwwroot in publish folder..."
        ls -la publish/wwwroot || echo "Warning: wwwroot not found!"
        if [ -d "publish/wwwroot" ]; then
          echo "✅ wwwroot found in publish folder"
          ls -la publish/wwwroot
        else
          echo "❌ wwwroot not found in publish folder"
          exit 1
        fi

    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: g2g-admin
        path: publish/
